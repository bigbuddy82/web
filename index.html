<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #630100;
            --brand-light: #da0500;
        }
        body {
            background-color: #fff;
            font-family: 'Space Mono', monospace;
            cursor: crosshair;
        }
        h1, h2 { font-family: 'Syne', sans-serif; }

        /* Retro Hard Shadow Effect */
        .retro-card {
            background: white;
            border: 3px solid #000;
            box-shadow: 8px 8px 0px #000;
            transition: all 0.2s;
        }
        .retro-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px var(--brand-light);
        }

        .retro-btn {
            background: var(--brand-light);
            color: white;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s;
            display: inline-block;
        }
        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }

        .brand-gradient-text {
            background: linear-gradient(to right, #630100, #da0500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Scanline Overlay Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="scanlines"></div>

    <nav class="border-b-4 border-black p-6 flex justify-center bg-white z-40">
        <span class="font-bold text-2xl tracking-tighter border-4 border-black px-4 bg-black text-white">WEB.OS</span>
    </nav>

    <main class="flex-grow flex items-center justify-center py-20 px-6 bg-slate-50">
        <div class="max-w-4xl w-full text-center">
            <div class="inline-block border-2 border-black px-4 py-1 mb-8 bg-yellow-300 font-bold uppercase tracking-widest text-sm shadow-[4px_4px_0px_#000]">
                Now Available for Projects
            </div>
            
            <h1 class="text-5xl md:text-8xl font-black mb-8 uppercase italic leading-none">
                <span class="brand-gradient-text">Affordable</span><br>Web Design
            </h1>

            <div class="retro-card p-8 md:p-12 mb-12 bg-white mx-auto">
                <p class="text-xl md:text-2xl font-bold leading-relaxed text-gray-800">
                    High-performance E-commerce & Business websites tailored to your brand. Professional results without the agency markup.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-8">
                <a href="https://wa.me/91YOURNUMBER" class="retro-btn px-12 py-5 text-2xl font-black uppercase tracking-widest">
                    Hire Us Now
                </a>
            </div>
            
            <p class="mt-12 font-bold text-sm uppercase tracking-widest opacity-40">
                Custom Solutions // E-Commerce // Mobile Responsive
            </p>
        </div>
    </main>

    <div class="h-4 brand-gradient w-full"></div>

</body>
</html>
